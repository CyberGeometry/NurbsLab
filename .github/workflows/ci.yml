name: C++20 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release, Debug]
    
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DNURBSLAB_BUILD_TESTS=ON
        -DNURBSLAB_BUILD_EXAMPLES=ON
        -S ${{ github.workspace }}

    - name: Build
      env:
        config_flag: ${{ matrix.os == 'windows-latest' && format('--config {0}', matrix.build_type) || '' }}
      run: cmake --build ${{ github.workspace }}/build ${{ env.config_flag }}

    - name: Test
      env:
        config_flag: ${{ matrix.os == 'windows-latest' && '--config ' || '' }}${{ matrix.build_type }}
      run: ctest --output-on-failure ${{ env.config_flag }}
      working-directory: ${{ github.workspace }}/build